<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesando login...</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f172a; color: #f1f5f9; }
        .loader { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const error = params.get('error');
        const role = params.get('role'); // role pasado por el backend

        if (token) {
            localStorage.setItem('token', token);
            // Guardar el role en sessionStorage para que auth.js lo use al redirigir
            if (role) sessionStorage.setItem('googleRole', role);
            // Redirigir al index
            window.location.href = '/';
        } else if (error) {
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelector('.loader').innerHTML = 
                    '<h2 style="color:#ef4444">Error en autenticación</h2>' +
                    '<p>No se pudo completar el login con Google.</p>' +
                    '<a href="/" style="color:#6366f1">Volver al inicio</a>';
            });
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelector('.loader').innerHTML = 
                    '<h2 style="color:#ef4444">Error</h2>' +
                    '<p>No se recibió el token de autenticación.</p>' +
                    '<a href="/" style="color:#6366f1">Volver al inicio</a>';
            });
        }
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Iniciando sesión con Google...</p>
    </div>
</body>
</html>
