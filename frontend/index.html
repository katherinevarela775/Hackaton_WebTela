<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BulkFab - Telas al por Mayor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 font-inter">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/" class="logo">BulkFab</a>
        </div>
        <div class="navbar-links">
            <a href="#productos">Productos</a>
            <a href="#categorias">Categorias</a>
        </div>
        <div class="navbar-actions">
            <button id="loginBtn" onclick="openLoginModal()">Iniciar Sesion</button>
            <button id="logoutBtn" onclick="logout()" style="display:none">Cerrar Sesion</button>
            <span id="userName" class="user-name"></span>
            <button class="cart-btn" onclick="openModal('cartModal')">
                🛒 <span id="cartBadge" class="cart-badge">0</span>
            </button>
            <button class="fav-btn" onclick="renderFavoritesPage('favoritesGrid'); openModal('favoritesModal')">♡</button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Telas al por Mayor</h1>
            <p class="hero-subtitle">Encuentra las mejores telas para tu negocio. Precios mayoristas, envio a todo el pais.</p>
            <a href="#productos" class="hero-cta btn-primary">Ver Catalogo</a>
        </div>
    </section>

    <!-- FILTROS -->
    <section class="filters-section" id="productos">
        <div class="filters-container">
            <input type="text" id="searchInput" placeholder="Buscar telas..." class="filter-input" />
            <select id="categoryFilter" class="filter-select">
                <option value="">Todas las categorias</option>
            </select>
            <select id="sortFilter" class="filter-select">
                <option value="">Ordenar por</option>
                <option value="price_asc">Precio: menor a mayor</option>
                <option value="price_desc">Precio: mayor a menor</option>
                <option value="name">Nombre A-Z</option>
            </select>
        </div>
    </section>

    <!-- GRID DE PRODUCTOS -->
    <main class="products-section">
        <div id="productsGrid" class="products-grid"></div>
    </main>

    <!-- MODAL LOGIN -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" data-modal-close>✕</button>
            <h2>Iniciar Sesion</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required />
                <input type="password" id="loginPassword" placeholder="Contraseña" required />
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            <p>¿No tienes cuenta? <a href="#" onclick="openRegisterModal()">Registrate</a></p>
        </div>
    </div>

    <!-- MODAL REGISTRO -->
    <div id="registerModal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" data-modal-close>✕</button>
            <h2>Crear Cuenta</h2>
            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Nombre completo" required />
                <input type="email" id="registerEmail" placeholder="Email" required />
                <input type="password" id="registerPassword" placeholder="Contraseña" required />
                <select id="registerRole">
                    <option value="cliente">Cliente</option>
                    <option value="vendedor">Vendedor</option>
                </select>
                <button type="submit" class="btn-primary">Registrarme</button>
            </form>
        </div>
    </div>

    <!-- MODAL CARRITO -->
    <div id="cartModal" class="modal-overlay">
        <div class="modal modal-cart">
            <button class="modal-close" data-modal-close>✕</button>
            <h2>Carrito de Compras</h2>
            <div id="cartContainer"></div>
            <button class="btn-primary btn-checkout" onclick="checkoutCart()">Confirmar Pedido</button>
        </div>
    </div>

    <!-- MODAL FAVORITOS -->
    <div id="favoritesModal" class="modal-overlay">
        <div class="modal modal-favorites">
            <button class="modal-close" data-modal-close>✕</button>
            <h2>Mis Favoritos</h2>
            <div id="favoritesGrid" class="products-grid"></div>
        </div>
    </div>

    <!-- MODAL DETALLE PRODUCTO -->
    <div id="productDetailModal" class="modal-overlay">
        <div class="modal modal-product">
            <button class="modal-close" data-modal-close>✕</button>
            <img class="modal-image" src="" alt="" />
            <h2 class="modal-title"></h2>
            <p class="modal-description"></p>
            <p class="modal-price"></p>
            <p class="modal-stock"></p>
            <button class="btn-add-cart btn-primary">Agregar al Carrito</button>
        </div>
    </div>
